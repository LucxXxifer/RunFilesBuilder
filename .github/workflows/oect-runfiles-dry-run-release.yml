name: OECT RunFiles Scaffold Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: New immutable release tag to create, or an existing tag that already points to this commit
        required: true
        default: oect-runfiles-scaffold-20260707-r1
  push:
    tags:
      - oect-runfiles-scaffold-*

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  scaffold:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate scripts
        run: |
          chmod +x oect/*.sh
          sh -n oect/install.sh
          sh -n oect/security-scan.sh
          sh -n oect/production-manifest.sh
          sh -n oect/download-store-ipks.sh

      - name: Prepare scaffold artifacts
        run: |
          set -eu
          rm -rf dist
          mkdir -p dist/scaffold dist/scan-payload
          cp -a oect/README.md dist/SAFETY.md
          cp -a oect/whitelist.txt oect/install.sh oect/security-denylist.txt dist/scaffold/
          cp -a oect/whitelist.txt oect/install.sh dist/scan-payload/
          ./oect/security-scan.sh dist/scan-payload oect/security-denylist.txt
          tar -C dist/scaffold -czf dist/oect-runfiles-scaffold.tar.gz .

      - name: Ensure immutable release tag
        run: |
          chmod +x oect/ensure-release-tag.sh
          ./oect/ensure-release-tag.sh "$RELEASE_TAG"

      - name: Create release metadata
        run: |
          set -eu
          ./oect/production-manifest.sh "$RELEASE_TAG" scaffold > dist/manifest.json
          (cd dist && sha256sum manifest.json SAFETY.md oect-runfiles-scaffold.tar.gz > SHA256SUMS)

      - name: Publish scaffold release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OECT RunFiles scaffold ${{ env.RELEASE_TAG }}
          body_path: dist/SAFETY.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            dist/manifest.json
            dist/SHA256SUMS
            dist/SAFETY.md
            dist/oect-runfiles-scaffold.tar.gz
