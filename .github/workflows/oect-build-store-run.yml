name: OECT Build Store Run

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        default: oect-store-run-20260706
      store_base_url:
        description: iStore package repository base URL
        required: true
        default: https://repo.istoreos.com/repo/all/store/

permissions:
  contents: write

jobs:
  build-store-run:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y makeself curl

      - name: Download whitelisted ipks
        run: |
          chmod +x oect/*.sh
          ./oect/download-store-ipks.sh "${{ inputs.store_base_url }}" build/store build/source-manifest.tsv
          cp oect/install.sh build/store/install.sh
          chmod +x build/store/install.sh

      - name: Security scan payload
        run: |
          ./oect/security-scan.sh build/store oect/security-denylist.txt

      - name: Package run artifact
        run: |
          set -eu
          mkdir -p dist
          version="$(awk -F_ '/^luci-app-store_/ {print $2; exit}' < <(cd build/store && ls luci-app-store_*.ipk))"
          if [ -z "$version" ]; then
            echo "ERROR: cannot detect luci-app-store version" >&2
            exit 30
          fi
          makeself build/store "dist/oect-luci-app-store-${version}_all.run" "OECT iStore installer ${version}" ./install.sh
          cp build/source-manifest.tsv dist/source-manifest.tsv
          ./oect/production-manifest.sh "${{ inputs.release_tag }}" store-run > dist/manifest.json
          cp oect/README.md dist/SAFETY.md
          (cd dist && sha256sum * > SHA256SUMS)

      - name: Publish Store run release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: OECT Store run ${{ inputs.release_tag }}
          body_path: dist/SAFETY.md
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            dist/*
